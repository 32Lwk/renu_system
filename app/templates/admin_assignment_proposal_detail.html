<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>提案詳細 {{ batch_id }} | ReNU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/base.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">提案バッチ: {{ batch_id }}</h1>
        <a class="button secondary" href="/admin/assignment/proposals">一覧へ</a>
      </div>
    </header>
    <main class="main">
      <section class="card">
        <table class="table">
          <thead>
            <tr>
              <th>イベント</th>
              <th>メンバー</th>
            </tr>
          </thead>
          <tbody>
            {% for r in rows %}
            <tr>
              <td>{{ r.event_name }}<br /><small>{{ r.event_id }}</small></td>
              <td>{{ r.member_name }}<br /><small>{{ r.member_id }}</small></td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        <div class="login-buttons">
          <form method="post" action="/admin/assignment/proposals/{{ batch_id }}/approve" style="display:inline">
            <button type="submit" class="button primary">承認（planned に確定）</button>
          </form>
          <form method="post" action="/admin/assignment/proposals/{{ batch_id }}/reject" style="display:inline" onsubmit="return confirm('却下して削除しますか？');">
            <button type="submit" class="button secondary">却下（行を削除）</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
