<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>コード確認 | ReNU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/base.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">ReNU コード確認</h1>
      </div>
    </header>
    <main class="main">
      <section class="card">
        <h2>6桁コードを入力</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if info %}
        <p class="info">{{ info }}</p>
        {% endif %}
        <form method="post" action="/onboarding/verify">
          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" class="input" required />
          </div>
          <div class="form-group">
            <label for="code">認証コード（6桁）</label>
            <input
              id="code"
              name="code"
              type="text"
              inputmode="numeric"
              pattern="[0-9]{6}"
              maxlength="6"
              class="input"
              required
              placeholder="123456"
            />
          </div>
          <button type="submit" class="button primary">確認</button>
        </form>
      </section>
    </main>
  </body>
</html>
