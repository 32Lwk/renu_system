<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>管理者ログイン | ReNU 勤怠・シフト管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/base.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">ReNU 管理者ログイン</h1>
      </div>
    </header>
    <main class="main">
      <section class="card">
        <h2>管理者ログイン</h2>
        {% if error %}
        <p style="color: #f97373">{{ error }}</p>
        {% endif %}
        <form method="post">
          <div style="margin-bottom: 1rem">
            <label for="password">パスワード</label><br />
            <input
              id="password"
              name="password"
              type="password"
              style="width: 100%; padding: 0.5rem; margin-top: 0.25rem"
              required
            />
          </div>
          <button class="button primary" type="submit">ログイン</button>
        </form>
      </section>
    </main>
  </body>
</html>
