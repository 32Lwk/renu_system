<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>繁忙期希望入力 | ReNU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/base.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">繁忙期希望入力</h1>
      </div>
    </header>
    <main class="main">
      <section class="card">
        <h2>希望を登録</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if info %}
        <p class="info">{{ info }}</p>
        {% endif %}
        <form method="post" action="/my/busy/preferences">
          <div class="form-group">
            <label for="event_id">イベントID</label>
            <input id="event_id" name="event_id" class="input" required />
          </div>
          <div class="form-group">
            <label for="preferred_role">希望役割</label>
            <input id="preferred_role" name="preferred_role" class="input" placeholder="例: 受付" />
          </div>
          <div class="form-group">
            <label for="priority">優先度（1が高い）</label>
            <input id="priority" name="priority" class="input" type="number" min="1" max="5" value="3" />
          </div>
          <div class="form-group">
            <label for="max_shifts">上限シフト数</label>
            <input id="max_shifts" name="max_shifts" class="input" type="number" min="0" max="20" value="5" />
          </div>
          <div class="form-group">
            <label for="note">備考</label>
            <input id="note" name="note" class="input" />
          </div>
          <button class="button primary" type="submit">保存</button>
        </form>
      </section>
    </main>
  </body>
</html>
