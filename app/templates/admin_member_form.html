<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>メンバー編集 | ReNU 管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/base.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">ReNU メンバー管理</h1>
      </div>
    </header>
    <main class="main">
      <section class="card">
        <h2>{% if mode == 'new' %}新規メンバー{% else %}メンバー編集{% endif %}</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form
          method="post"
          action="{% if mode == 'new' %}/admin/members/new{% else %}/admin/members/{{ member.member_id }}/edit{% endif %}"
        >
          <div class="form-group">
            <label for="full_name">氏名</label>
            <input id="full_name" name="full_name" class="input" required value="{{ member.full_name or '' }}" />
          </div>
          <div class="form-group">
            <label for="grade">学年</label>
            <select id="grade" name="grade" class="input" required>
              {% set g = member.grade or 'B1' %}
              <option value="B1" {% if g=='B1' %}selected{% endif %}>B1</option>
              <option value="B2" {% if g=='B2' %}selected{% endif %}>B2</option>
              <option value="B3" {% if g=='B3' %}selected{% endif %}>B3</option>
            </select>
          </div>
          <div class="form-group">
            <label for="email">メール</label>
            <input id="email" name="email" type="email" class="input" value="{{ member.email or '' }}" />
          </div>
          <div class="form-group">
            <label for="teams">所属班（カンマ区切り）</label>
            <input id="teams" name="teams" class="input" value="{{ member.teams or '' }}" />
          </div>
          <div class="form-group">
            <label for="roles">役職（カンマ区切り）</label>
            <input id="roles" name="roles" class="input" value="{{ member.roles or '' }}" />
          </div>
          <div class="form-group">
            <label for="status">ステータス</label>
            {% set s = member.status or 'active' %}
            <select id="status" name="status" class="input">
              <option value="pending" {% if s=='pending' %}selected{% endif %}>pending</option>
              <option value="email_verified" {% if s=='email_verified' %}selected{% endif %}>email_verified</option>
              <option value="merge_pending" {% if s=='merge_pending' %}selected{% endif %}>merge_pending</option>
              <option value="active" {% if s=='active' %}selected{% endif %}>active</option>
              <option value="inactive" {% if s=='inactive' %}selected{% endif %}>inactive</option>
            </select>
          </div>
          <button class="button primary" type="submit">保存</button>
        </form>
      </section>
    </main>
  </body>
</html>
